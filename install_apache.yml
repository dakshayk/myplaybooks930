---
- name: this playbook is to run in every node
  hosts: all
  become: yes
  tasks:
     - name: Install httpd package
       yum:
        name: httpd
        state: present
       when: ansible_os_family == "RedHat"

     - name: start httpd service
       service:
        name: httpd
        state: started
       when: ansible_os_family == "RedHat"

     - name: Install apache2 service
       apt:
        name: apache2
        state: present
       when: ansible_os_family == "Debian"

     - name: start apache2 service
       service:
        name: apache2
        state: started
       when: ansible_os_family == "Debian"


