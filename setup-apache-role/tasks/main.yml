---
# tasks file for setup-apache-role
- name: Install httpd package
  yum:
    name: "{{httpd_package_name}}"
    state: present
  when: ansible_os_family == "RedHat"
  notify: start httpd service

- name: Install apache2 package
  apt:
    name: "{{apache2_package_name}}"
    state: present
  when: ansible_os_family == "Debian"
  notify: start apache2 service

- name: copy index file
  copy:
    src: index.html        #No need to give index file path bcz what ever file name we mention that file name should be found from files folder
    dest: /var/www/html
    mode: 0777
